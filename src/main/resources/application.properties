spring.application.name=search-suggestion-service

# H2 file-based database (persists to disk, survives restarts)
spring.datasource.url=jdbc:h2:file:./data/searchdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=1000
spring.jpa.properties.hibernate.order_inserts=true

# H2 web console (browse your DB visually at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=${PORT:8080}